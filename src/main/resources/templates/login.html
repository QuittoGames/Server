<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Quitto Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 24px rgba(0,0,0,.4);
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }
        .sub {
            color: #94a3b8;
            font-size: .875rem;
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: .875rem;
            margin-bottom: 6px;
            color: #cbd5e1;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: .875rem;
            margin-bottom: 16px;
            outline: none;
            transition: border .2s;
        }
        input:focus { border-color: #3b82f6; }
        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: #fff;
            font-size: .875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }
        button:hover { background: #2563eb; }
        .error {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 10px;
            border-radius: 8px;
            font-size: .875rem;
            margin-bottom: 16px;
            display: none;
        }
        .divider {
            text-align: center;
            color: #475569;
            font-size: .75rem;
            margin: 20px 0 16px;
            position: relative;
        }
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #334155;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .google-btn {
            display: block;
            text-align: center;
            padding: 10px;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            text-decoration: none;
            font-size: .875rem;
            transition: background .2s;
        }
        .google-btn:hover { background: #334155; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Entrar</h1>
        <p class="sub">Faça login no Quitto Server</p>

        <div class="error" id="errorMsg"></div>

        <form id="loginForm">
            <label for="name">Usuário</label>
            <input type="text" id="name" name="name" required autocomplete="username" />

            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" />

            <button type="submit">Entrar</button>
        </form>

        <div class="divider">ou</div>

        <a class="google-btn" href="/oauth2/authorization/google">Entrar com Google</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('errorMsg');
            errorEl.style.display = 'none';

            const name = document.getElementById('name').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, password })
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    errorEl.textContent = err.message || 'Erro ao autenticar';
                    errorEl.style.display = 'block';
                    return;
                }

                const data = await res.json();
                localStorage.setItem('token', data.token);
                window.location.href = '/';
            } catch (err) {
                errorEl.textContent = 'Erro de conexão com o servidor';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
