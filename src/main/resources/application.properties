spring.application.name=coffe_server
spring.application.group=quitto
server.port=8080

server.http2.enabled=true
server.max-http-request-header-size=64KB
server.reactive.session.timeout=36000
spring.application.version=0.1v

spring.config.import=optional:file:.env[.properties]

#DB
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# OAuth
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_SECRET_API}

#Auth
api.security.key=${SERVER_API_KEY}

# Spring Security
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.user-name-attribute=sub

#Log
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.oauth2=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.com.quitto=DEBUG

# Spring IA
spring.ai.mcp.server.name=CoffeMCP
spring.ai.mcp.server.base-url="/mcp"
spring.ai.mcp.server.request-timeout=300
spring.ai.mcp.server.version=0.1v
